# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - evaluaciondedesempeñoAB

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Resolve Power Automate reminder URL
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $settingsPath = 'appsettings.json'
          $settings = Get-Content $settingsPath -Raw | ConvertFrom-Json
          $tenantId = $settings.AzureAd.TenantId
          $clientId = $settings.AzureAd.ClientId
          $clientSecret = $settings.AzureAd.ClientSecret
          $environmentId = '281406ef-ab25-e78f-ae54-4671f1cd19ed'
          $workflowId = '20463e73-476f-f111-ab0f-002248e09de5'
          $token = Invoke-RestMethod -Method Post -Uri "https://login.microsoftonline.com/$tenantId/oauth2/v2.0/token" -Body @{ client_id = $clientId; client_secret = $clientSecret; grant_type = 'client_credentials'; scope = 'https://service.flow.microsoft.com/.default' }
          $callback = Invoke-RestMethod -Method Post -Uri "https://api.flow.microsoft.com/providers/Microsoft.ProcessSimple/environments/$environmentId/flows/$workflowId/triggers/manual/listCallbackUrl?api-version=2016-11-01" -Headers @{ Authorization = "Bearer $($token.access_token)" } -Body '{}' -ContentType 'application/json'
          if (-not $callback.value) { throw 'Power Automate no devolvio callback URL.' }
          if (-not $settings.PowerAutomate) { $settings | Add-Member -NotePropertyName PowerAutomate -NotePropertyValue ([pscustomobject]@{}) }
          $settings.PowerAutomate | Add-Member -NotePropertyName RecordatorioEvaluacionesUrl -NotePropertyValue $callback.value -Force
          $settings | ConvertTo-Json -Depth 20 | Set-Content $settingsPath -Encoding UTF8

      - name: Build with dotnet
        run: dotnet build --configuration Release

      - name: dotnet publish
        run: dotnet publish -c Release -o "${{env.DOTNET_ROOT}}/myapp"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_C77069D82DAC4FB78198C5B874B4FC66 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_C52F3F772B694F84996DD69427CA4437 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_85C2B27EEE5549F5858BA10464AF772B }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'evaluaciondedesempeñoAB'
          slot-name: 'Production'
          package: .
          