# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - EvdesempenoAB

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Resolve Power Automate reminder URL
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $settingsPath = 'appsettings.json'
          $settings = Get-Content $settingsPath -Raw | ConvertFrom-Json
          if (-not $settings.PowerAutomate) { $settings | Add-Member -NotePropertyName PowerAutomate -NotePropertyValue ([pscustomobject]@{}) }

          try {
            $tenantId = $settings.AzureAd.TenantId
            $clientId = $settings.AzureAd.ClientId
            $clientSecret = $settings.AzureAd.ClientSecret
            $environmentId = '281406ef-ab25-e78f-ae54-4671f1cd19ed'
            $workflowId = '20463e73-476f-f111-ab0f-002248e09de5'
            $token = Invoke-RestMethod -Method Post -Uri "https://login.microsoftonline.com/$tenantId/oauth2/v2.0/token" -Body @{ client_id = $clientId; client_secret = $clientSecret; grant_type = 'client_credentials'; scope = 'https://service.flow.microsoft.com/.default' }
            $callback = Invoke-RestMethod -Method Post -Uri "https://api.flow.microsoft.com/providers/Microsoft.ProcessSimple/environments/$environmentId/flows/$workflowId/triggers/manual/listCallbackUrl?api-version=2016-11-01" -Headers @{ Authorization = "Bearer $($token.access_token)" } -Body '{}' -ContentType 'application/json'
            if (-not $callback.value) { throw 'Power Automate no devolvio callback URL.' }
            $settings.PowerAutomate | Add-Member -NotePropertyName RecordatorioEvaluacionesUrl -NotePropertyValue $callback.value -Force
          }
          catch {
            Write-Warning "No fue posible resolver la URL de recordatorio de Power Automate: $($_.Exception.Message)"
          }

          $settings | ConvertTo-Json -Depth 20 | Set-Content $settingsPath -Encoding UTF8

      - name: Build with dotnet
        run: dotnet build --configuration Release

      - name: Write deployment marker
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $markerDirectory = 'wwwroot/deployment-marker'
          New-Item -ItemType Directory -Force -Path $markerDirectory | Out-Null
          @{
            commit = '${{ github.sha }}'
            branch = '${{ github.ref_name }}'
            feature = 'supervision-evaluaciones'
            generatedAtUtc = (Get-Date).ToUniversalTime().ToString('o')
          } | ConvertTo-Json -Depth 5 | Set-Content "$markerDirectory/supervision-evaluaciones.json" -Encoding UTF8

      - name: dotnet publish
        run: dotnet publish -c Release -o "${{env.DOTNET_ROOT}}/myapp"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Login to Azure
        id: azure-login
        continue-on-error: true
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_CB1496462C0C4BBEBE9ABABB9F9DD460 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_989934D53EDA47848799F6905479E60A }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_7445E8249C6D4ECE9948F1B46B03C72B }}

      - name: Fallback Azure login from app settings
        if: steps.azure-login.outcome != 'success'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $env:AZURE_CORE_OUTPUT = 'none'
          $settings = Get-Content 'appsettings.json' -Raw | ConvertFrom-Json
          Write-Output "::add-mask::$($settings.AzureAd.ClientSecret)"
          az login --service-principal --username $settings.AzureAd.ClientId --password $settings.AzureAd.ClientSecret --tenant $settings.AzureAd.TenantId | Out-Null
          az account set --subscription '${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_7445E8249C6D4ECE9948F1B46B03C72B }}'

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'EvdesempenoAB'
          slot-name: 'Production'
          package: .

  validate-production:
    runs-on: windows-latest
    needs: deploy
    if: always()
    permissions:
      statuses: write

    steps:
      - name: Report failed deploy
        if: needs.deploy.result != 'success'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
        run: |
          $ErrorActionPreference = 'Stop'
          $targetUrl = 'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}?deploy=' + $env:DEPLOY_RESULT
          $description = "Deploy job result: $env:DEPLOY_RESULT"
          $body = @{
            state = 'failure'
            context = "appservice/deploy-$env:DEPLOY_RESULT"
            description = $description
            target_url = $targetUrl
          } | ConvertTo-Json -Depth 5
          Invoke-RestMethod -Method Post -Uri 'https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.sha }}' -Headers @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept = 'application/vnd.github+json'
            'X-GitHub-Api-Version' = '2022-11-28'
            'User-Agent' = 'appservice-production-smoke'
          } -Body $body -ContentType 'application/json'
          throw $description

      - name: Smoke test production URL
        if: needs.deploy.result == 'success'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          $markerUrl = 'https://evdesempenoab.azurewebsites.net/deployment-marker/supervision-evaluaciones.json'
          $routeUrl = 'https://evdesempenoab.azurewebsites.net/SupervisionEvaluaciones'
          $expectedCommit = '${{ github.sha }}'

          function Set-CommitStatus([string]$state, [string]$description, [string]$targetUrl = $routeUrl) {
            if ($description.Length -gt 140) {
              $description = $description.Substring(0, 137) + '...'
            }

            $body = @{
              state = $state
              context = 'appservice/production-smoke'
              description = $description
              target_url = $targetUrl
            } | ConvertTo-Json -Depth 5

            Invoke-RestMethod -Method Post -Uri 'https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.sha }}' -Headers @{
              Authorization = "Bearer $env:GITHUB_TOKEN"
              Accept = 'application/vnd.github+json'
              'X-GitHub-Api-Version' = '2022-11-28'
              'User-Agent' = 'appservice-production-smoke'
            } -Body $body -ContentType 'application/json'
          }

          try {
            $marker = $null
            for ($attempt = 1; $attempt -le 18; $attempt++) {
              try {
                $marker = Invoke-RestMethod -Method Get -Uri $markerUrl -TimeoutSec 20
                if ($marker.commit -eq $expectedCommit) {
                  break
                }
              }
              catch {
                if ($attempt -eq 18) { throw }
              }

              Start-Sleep -Seconds 10
            }

            if ($null -eq $marker) {
              throw 'Production marker was not returned.'
            }

            if ($marker.commit -ne $expectedCommit) {
              throw "Production marker commit mismatch. Expected $expectedCommit, got $($marker.commit)."
            }

            $handler = [System.Net.Http.HttpClientHandler]::new()
            $handler.AllowAutoRedirect = $false
            $client = [System.Net.Http.HttpClient]::new($handler)
            $response = $client.GetAsync($routeUrl).GetAwaiter().GetResult()
            $statusCode = [int]$response.StatusCode
            $acceptedStatuses = @(200, 302, 401, 403)

            if ($acceptedStatuses -notcontains $statusCode) {
              throw "SupervisionEvaluaciones route returned HTTP $statusCode."
            }

            $shortCommit = $expectedCommit.Substring(0, 7)
            Set-CommitStatus 'success' "Production has $shortCommit and supervision route HTTP $statusCode"
          }
          catch {
            $encodedReason = [System.Uri]::EscapeDataString($_.Exception.Message)
            Set-CommitStatus 'failure' $_.Exception.Message "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}?validation=$encodedReason"
            throw
          }
